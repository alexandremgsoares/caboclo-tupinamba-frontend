<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limpando Cache - Centro Tupinambá</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2d5016, #4a7c2a);
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }
        p {
            margin-bottom: 0.5rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Atualizando o site...</h1>
        <p>Limpando cache antigo</p>
        <p>Você será redirecionado em instantes</p>
    </div>

    <script>
        console.log('🧹 Iniciando limpeza de cache...');
        
        async function clearEverything() {
            try {
                // Limpar service workers
                if ('serviceWorker' in navigator) {
                    console.log('🔄 Removendo service workers...');
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(registrations.map(reg => {
                        console.log('Unregistering:', reg.scope);
                        return reg.unregister();
                    }));
                }
                
                // Limpar todos os caches
                if ('caches' in window) {
                    console.log('🗑️ Limpando caches...');
                    const cacheNames = await caches.keys();
                    await Promise.all(cacheNames.map(name => {
                        console.log('Deleting cache:', name);
                        return caches.delete(name);
                    }));
                }
                
                // Limpar storage
                console.log('📦 Limpando storage...');
                localStorage.clear();
                sessionStorage.clear();
                
                // Limpar IndexedDB se existir
                if ('indexedDB' in window) {
                    try {
                        console.log('🗄️ Limpando IndexedDB...');
                        const databases = await indexedDB.databases();
                        await Promise.all(databases.map(db => {
                            if (db.name) {
                                return new Promise((resolve, reject) => {
                                    const deleteReq = indexedDB.deleteDatabase(db.name);
                                    deleteReq.onsuccess = () => resolve(true);
                                    deleteReq.onerror = () => reject(deleteReq.error);
                                });
                            }
                        }));
                    } catch (e) {
                        console.log('IndexedDB cleanup not supported or failed:', e);
                    }
                }
                
                console.log('✅ Limpeza concluída! Redirecionando...');
                
                // Esperar um pouco antes de redirecionar
                setTimeout(() => {
                    window.location.href = '/?cache-cleared=true';
                }, 2000);
                
            } catch (error) {
                console.error('Erro durante limpeza:', error);
                // Mesmo com erro, redirecionar
                setTimeout(() => {
                    window.location.href = '/?cache-cleared=error';
                }, 3000);
            }
        }
        
        // Iniciar limpeza
        clearEverything();
    </script>
</body>
</html>
